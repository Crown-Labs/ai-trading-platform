services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_trading_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trading}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_trading"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-trading

  # ── OpenClaw AI Gateway ──────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: ai-trading-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/root/.openclaw
      - ./openclaw/SOUL.md:/root/.openclaw/workspace-strategy-advisor/SOUL.md:ro
      - ./openclaw/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - ai-trading

  # ── NestJS Backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: ai-trading-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ai_trading}:${POSTGRES_PASSWORD:-ai_trading_dev}@postgres:5432/${POSTGRES_DB:-ai_trading}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENCLAW_GATEWAY_URL=http://openclaw:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-strategy-advisor}
    depends_on:
      postgres:
        condition: service_healthy
      openclaw:
        condition: service_started
    networks:
      - ai-trading

  # ── Vite Web Frontend ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: ai-trading-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-trading

networks:
  ai-trading:
    driver: bridge

volumes:
  openclaw-data:
  postgres-data:
