# Production: pulls pre-built images from ghcr.io
# OpenClaw is managed separately on the production server.
#
# Usage on prod server:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required .env:
#   OPENCLAW_GATEWAY_TOKEN=...
#   OPENCLAW_AGENT_ID=strategy-advisor  (or your agent id)

services:
  backend:
    image: ghcr.io/crown-labs/ai-trading-platform/backend:latest
    container_name: ai-trading-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://localhost:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-strategy-advisor}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    networks:
      - ai-trading

  web:
    image: ghcr.io/crown-labs/ai-trading-platform/web:latest
    container_name: ai-trading-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-trading

networks:
  ai-trading:
    driver: bridge
