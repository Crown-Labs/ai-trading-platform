# Production: pulls pre-built images from Docker Hub
# OpenClaw is managed separately on the production server.
#
# Usage on prod server:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required .env:
#   DATABASE_URL=postgresql://user:pass@host:5432/db
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...
#   JWT_SECRET=...
#   OPENCLAW_GATEWAY_TOKEN=...
#   OPENCLAW_AGENT_ID=strategy-advisor  (or your agent id)

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trading}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_trading}"]
      interval: 5s
      timeout: 5s
      retries: 5
    network_mode: host

  backend:
    image: 0xthoth/ai-trading-backend:latest
    container_name: ai-trading-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL:-postgresql://ai_trading:${POSTGRES_PASSWORD}@localhost:5432/ai_trading}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://localhost:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-strategy-advisor}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: 0xthoth/ai-trading-web:latest
    container_name: ai-trading-web
    restart: unless-stopped
    ports:
      - "3020:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres-data:
