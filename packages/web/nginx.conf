server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Block sensitive files and directories
    location ~* /\.(env|git|htaccess|htpasswd|svn|DS_Store)(/|$) {
        return 404;
    }
    location ~* \.(env|bak|backup|save|log|sql|sh|config)$ {
        return 404;
    }
    location ~* /(phpinfo|wp-config|debug|debugbar|admin/\.env|backend/\.env|aws\.config|aws-config|config\.js) {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://host.docker.internal:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
