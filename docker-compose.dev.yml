# Dev mode: Only OpenClaw runs in Docker.
# Backend and web still run locally via `yarn dev`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   yarn dev

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: ai-trading-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"   # exposed to host so local backend can reach it
    volumes:
      - openclaw-data:/root/.openclaw
      - ./openclaw/SOUL.md:/root/.openclaw/workspace-strategy-advisor/SOUL.md:ro
      - ./openclaw/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trading_platform}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  openclaw-data:
  postgres-data:
